<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BodyBank – Program PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:#000}
    #pvFrame{
      position:fixed;
      top:0;left:0;
      width:100%;
      height:100%;
      border:none;
    }
    #pvClose{
      position:fixed;
      top:max(14px, env(safe-area-inset-top, 14px));
      right:max(14px, env(safe-area-inset-right, 14px));
      width:46px;
      height:46px;
      border-radius:50%;
      border:none;
      background:rgba(0,0,0,0.72);
      color:#fff;
      font-size:28px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:9999;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:0 2px 16px rgba(0,0,0,0.5);
    }
    #pvClose:active{background:rgba(200,164,78,0.9);color:#000}
  </style>
</head>
<body>
  <iframe id="pvFrame" title="Program PDF" allowfullscreen></iframe>
  <button id="pvClose" aria-label="Close">&#x2715;</button>
  <script>
    (function(){
      var url = new URLSearchParams(window.location.search).get('url') || '';
      if(url){
        document.getElementById('pvFrame').src = url;
      }
      document.getElementById('pvClose').addEventListener('click', function(){
        if(window.history.length > 1){ window.history.back(); }
        else { window.location.href = '/index.html'; }
      });
    })();
  </script>
</body>
</html>
