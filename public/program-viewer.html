<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BodyBank – Program PDF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    #pvFrame{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      border:0;
    }
    #pvClose{
      position:fixed;
      top:max(14px, env(safe-area-inset-top, 14px));
      right:max(14px, env(safe-area-inset-right, 14px));
      width:44px;
      height:44px;
      border-radius:50%;
      border:none;
      background:rgba(0,0,0,0.65);
      color:#fff;
      font-size:26px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:999;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      box-shadow:0 2px 12px rgba(0,0,0,0.4);
      transition:background .2s;
    }
    #pvClose:hover,#pvClose:active{background:rgba(200,164,78,0.85);color:#000}
    #pvLoading{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0d0d0d;
      color:#f5f0e8;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      font-size:14px;
      z-index:1;
      flex-direction:column;
      gap:12px;
    }
    .spinner{width:32px;height:32px;border:3px solid rgba(200,164,78,0.2);border-top-color:#c8a44e;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="pvLoading"><div class="spinner"></div><span>Loading PDF…</span></div>
  <iframe id="pvFrame" title="Program PDF"></iframe>
  <button id="pvClose" aria-label="Close">×</button>
  <script>
    (function(){
      var params = new URLSearchParams(window.location.search);
      var url = params.get('url') || '';
      var frame = document.getElementById('pvFrame');
      var loading = document.getElementById('pvLoading');

      if (url) {
        try {
          var u = new URL(url, window.location.origin);
          if (u.origin === window.location.origin) {
            frame.src = url;
            frame.onload = function(){ if(loading) loading.style.display='none'; };
            setTimeout(function(){ if(loading) loading.style.display='none'; }, 4000);
          } else {
            loading.innerHTML = '<span>Invalid link.</span>';
          }
        } catch(_) {
          loading.innerHTML = '<span>Invalid link.</span>';
        }
      } else {
        loading.innerHTML = '<span>No program specified.</span>';
      }

      document.getElementById('pvClose').addEventListener('click', function(){
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/index.html';
        }
      });
    })();
  </script>
</body>
</html>
