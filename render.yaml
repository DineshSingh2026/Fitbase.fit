# Render Blueprint — BodyBank
# Add a PostgreSQL database (Render Postgres) and set DATABASE_URL in environment variables.
# For scheduled messages: set CRON_SECRET on both web + cron services (same value).

services:
  - type: web
    name: bodybank-fit
    env: node
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
