services:
  - type: web
    name: fitbase-backend-nest
    env: node
    rootDir: apps/backend-nest
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3200
      # Required: link Render Postgres or paste External/Internal URL (must match the DB your data lives in).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      # Optional override; code defaults to 365d if unset. jsonwebtoken format (e.g. 30d, 12h).
      - key: JWT_EXPIRY
        value: 365d
      # Web Push (PWA): npx web-push generate-vapid-keys — optional; without these, in-app bell + badge API still work.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASS
        sync: false

  - type: web
    name: fitbase-frontend-next
    env: node
    rootDir: apps/frontend-next
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_LEGACY_SITE_URL
        sync: false
      - key: BACKEND_URL
        sync: false
