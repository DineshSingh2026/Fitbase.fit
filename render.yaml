# Render Blueprint — BodyBank
# Repo root = app root (server.js, package.json). Do NOT set Root Directory to "src".
# Add a PostgreSQL database (Render Postgres) and set DATABASE_URL in environment variables.
# For scheduled messages: set CRON_SECRET on both web + cron services (same value).

services:
  - type: web
    name: bodybank-fit
    env: node
    buildCommand: npm install
    startCommand: npm start
    # Root Directory: leave empty so Render uses repo root (where server.js lives)

  - type: cron
    name: bodybank-scheduled-messages
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: node -e "const s=process.env.CRON_SECRET||'';const u='https://bodybank-fit.onrender.com/api/cron/process-scheduled-messages?secret='+encodeURIComponent(s);require('https').get(u,(r)=>{process.exit(r.statusCode>=200&&r.statusCode<300?0:1)}).on('error',()=>process.exit(1))"
